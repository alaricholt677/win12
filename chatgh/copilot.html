<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Copilot (Embedded)</title>

<style>
  :root{
    --bg0:#070a16;
    --bg1:#0c1230;
    --mica: rgba(255,255,255,.10);
    --mica2: rgba(255,255,255,.06);
    --stroke: rgba(255,255,255,.14);
    --shadow: rgba(0,0,0,.55);
    --text: rgba(255,255,255,.92);
    --muted: rgba(255,255,255,.62);
    --accent1: rgb(174,115,229);
    --accent2: rgb(21,105,223);
    --radius: 18px;
    --radius2: 12px;
  }

  html, body{ height:100%; margin:0; overflow:hidden; font-family: system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif; color:var(--text); }
  body{
    background:
      radial-gradient(900px 650px at 22% 18%, rgba(174,115,229,.22), transparent 60%),
      radial-gradient(900px 650px at 74% 60%, rgba(21,105,223,.20), transparent 60%),
      linear-gradient(180deg, var(--bg0), var(--bg1));
  }

  /* “desktop.html copilot UI” shape: title bar + chat + input box [1](https://pureinfotech.com/enable-windows-11-insider-program-experimental-beta-channel/)[2](https://support.microsoft.com/en-us/windows/join-the-windows-insider-program-and-manage-insider-settings-ef20bb3d-40f4-20cc-ba3c-a72c844b563c) */
  .panel{
    height:100%;
    display:flex;
    flex-direction:column;
    background: linear-gradient(180deg, var(--mica), var(--mica2));
    border: 1px solid var(--stroke);
    border-radius: var(--radius);
    box-shadow: 0 30px 90px var(--shadow);
    backdrop-filter: blur(18px);
    overflow:hidden;
  }

  .titbar{
    height: 44px;
    display:flex;
    align-items:center;
    gap:10px;
    padding: 0 12px;
    border-bottom: 1px solid rgba(255,255,255,.10);
    user-select:none;
  }
  .logo{
    width: 22px; height: 22px;
    border-radius: 10px;
    background: linear-gradient(90deg, rgba(174,115,229,.75), rgba(21,105,223,.75));
    border: 1px solid rgba(255,255,255,.14);
    display:inline-flex; align-items:center; justify-content:center;
    font-weight: 800;
    font-size: 12px;
  }
  .titbar .title{
    font-size: 14px;
    letter-spacing: .4px;
    font-weight: 700;
    flex: 1;
  }
  .titbar .btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    height: 28px;
    padding: 0 10px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,.12);
    background: rgba(0,0,0,.14);
    color: rgba(255,255,255,.88);
    cursor:pointer;
    transition: 120ms ease;
    font-size: 12px;
  }
  .titbar .btn:hover{ background: rgba(255,255,255,.08); }

  .row{
    display:flex;
    gap:10px;
    padding: 10px 12px;
    border-bottom: 1px solid rgba(255,255,255,.10);
    align-items:center;
  }

  .input{
    height: 36px;
    border-radius: var(--radius2);
    border: 1px solid rgba(255,255,255,.14);
    background: rgba(0,0,0,.18);
    color: var(--text);
    padding: 0 12px;
    outline:none;
  }
  .input::placeholder{ color: rgba(255,255,255,.55); }

  .cta{
    height: 36px;
    border-radius: var(--radius2);
    background-image: linear-gradient(90deg, var(--accent1), var(--accent2));
    color: #fff;
    font-weight: 700;
    border: 0;
    padding: 0 12px;
    cursor:pointer;
    box-shadow: 0 12px 22px rgba(0,0,0,.18);
    transition: transform 120ms ease, filter 120ms ease;
    white-space:nowrap;
  }
  .cta:hover{ transform: translateY(-1px); filter: brightness(1.05); }

  .split{
    flex:1;
    min-height:0;
    display:flex;
  }

  /* Left: chat */
  #chat{
    flex: 1;
    min-width: 320px;
    overflow:auto;
    padding: 14px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .line{ display:flex; }
  .line.user{ justify-content:flex-end; }
  .line.ai, .line.system{ justify-content:flex-start; }

  .bubble{
    max-width: min(720px, 78%);
    padding: 10px 12px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,.12);
    background: rgba(0,0,0,.20);
    color: var(--text);
    line-height: 1.35;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .line.user .bubble{
    background-image: linear-gradient(90deg, rgba(174,115,229,.88), rgba(21,105,223,.88));
    border: 1px solid rgba(255,255,255,.16);
  }
  .line.system .bubble{
    background-image: linear-gradient(90deg, rgba(174,115,229,.30), rgba(21,105,223,.22));
    border: 1px solid rgba(255,255,255,.16);
  }

  .action{
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,.12);
    background: rgba(0,0,0,.18);
    padding: 10px 12px;
    margin-top: 6px;
  }
  .action .t{ margin:0; font-weight:800; font-size: 12px; }
  .action .d{ margin:6px 0 0 0; color: var(--muted); font-size: 12px; word-break: break-all; }

  /* Input box */
  .inputbox{
    display:flex;
    gap:10px;
    padding: 10px 12px;
    border-top: 1px solid rgba(255,255,255,.10);
    align-items:center;
  }
  .inputbox.disable{ opacity:.55; pointer-events:none; }

  /* Right: internal viewer (for openurl) */
  #viewerWrap{
    width: min(46%, 520px);
    border-left: 1px solid rgba(255,255,255,.10);
    display:flex;
    flex-direction:column;
    min-height:0;
    background: rgba(0,0,0,.10);
  }
  #viewerTop{
    padding: 10px 12px;
    border-bottom: 1px solid rgba(255,255,255,.10);
    display:flex;
    gap:10px;
    align-items:center;
  }
  #viewerLabel{ font-size: 12px; color: var(--muted); flex:1; }
  #viewer{
    flex: 1;
    width:100%;
    border:0;
    background: rgba(0,0,0,.14);
  }
  #viewerWrap.hidden{ display:none; }

  /* Scrollbar */
  #chat::-webkit-scrollbar{ width: 10px; }
  #chat::-webkit-scrollbar-thumb{
    background: rgba(255,255,255,.16);
    border-radius: 999px;
    border: 2px solid transparent;
    background-clip: padding-box;
  }

  .small{ font-size: 12px; color: var(--muted); }
  .link{ color: #9bd3ff; text-decoration: none; }
  .link:hover{ text-decoration: underline; }
</style>
</head>

<body>

<div class="panel">

  <!-- Title bar -->
  <div class="titbar">
    <div class="logo">C</div>
    <div class="title">Windows 12 Copilot (Embedded)</div>
    <button class="btn" id="btnHelp" title="Precautions">?</button>
    <button class="btn" id="btnToggleViewer" title="Toggle viewer">Viewer</button>
  </div>

  <!-- URL bar (local only, opens in viewer iframe below) -->
  <div class="row">
    <input id="urlInput" class="input" type="text" spellcheck="false"
      placeholder="Type a URL or search terms (opens in Viewer)"
      onkeydown="if(event.key==='Enter'){document.getElementById('btnOpenUrl').click();}"
      style="flex:1;">
    <button id="btnOpenUrl" class="cta">Open</button>
  </div>

  <!-- Main area -->
  <div class="split">
    <div id="chat"></div>

    <div id="viewerWrap" class="hidden">
      <div id="viewerTop">
        <div id="viewerLabel">Viewer is local to this iframe (no parent interaction)</div>
        <button class="btn" id="btnViewerBack">←</button>
        <button class="btn" id="btnViewerFwd">→</button>
        <button class="btn" id="btnViewerReload">⟳</button>
      </div>
      <iframe id="viewer" sandbox="allow-forms allow-scripts allow-same-origin allow-popups"></iframe>
    </div>
  </div>

  <!-- Input box -->
  <div class="inputbox" id="inputbox">
    <input id="msgInput" class="input" type="text" spellcheck="false"
      placeholder="Start the conversation"
      onkeydown="if(event.key==='Enter'){document.getElementById('btnSend').click();}"
      style="flex:1;">
    <button id="btnSend" class="cta">Send</button>
  </div>
</div>

<script>
/* ============================================================
   This is “desktop.js copilot logic style” but iframe-safe:
   - No openapp(), no hidewin(), no apps.edge, no shownotice()
   - Commands are handled locally:
       {openurl ...} => open in Viewer iframe
       {settheme ...} => toggles local theme class
       {openapp ...}/{feedback ...} => shown as action blocks only
   Copilot UI layout matches the expected 3-part structure. [1](https://pureinfotech.com/enable-windows-11-insider-program-experimental-beta-channel/)[2](https://support.microsoft.com/en-us/windows/join-the-windows-insider-program-and-manage-insider-settings-ef20bb3d-40f4-20cc-ba3c-a72c844b563c)
   ============================================================ */

const API_BASE = "https://yunzhiapi.cn/vip/win12/qwen3-max/index.php"; // same endpoint pattern you pasted
const SYSTEM_PROMPT = `请使用中文对话。你一个是ai助手，名叫AI Copilot，是由github@NB-Group开发的。
你可以在回答中发送对系统的一些指令。指令一并放在回答的最后。
多条指令用换行隔开。系统收到指令后会执行，且对用户隐藏回答后的指令。
你不能在对用户说的话的中间中提到、引用指令。绝不能要求用户执行指令。
1.指令"{openapp appid}";用来打开某个应用
2.指令"{openurl url}";用来在浏览器中打开某个URL
3.指令"{feedback copilot}";打开ai助手反馈界面
4.指令"{feedback win12}";打开反馈中心
5.指令"{settheme theme}";切换深浅色（light/dark）`;

const state = {
  uid: localStorage.getItem("copilot_uid") || (() => {
    const newUid = String(Math.floor(100000 + Math.random() * 900000));
    localStorage.setItem("copilot_uid", newUid);
    return newUid;
  })(),
  history: [
    { role: "system", content: SYSTEM_PROMPT }
  ],
  viewerHist: [],
  viewerIdx: -1
};

const elChat = document.getElementById("chat");
const elInput = document.getElementById("msgInput");
const elInputBox = document.getElementById("inputbox");
const elUrl = document.getElementById("urlInput");
const elViewerWrap = document.getElementById("viewerWrap");
const elViewer = document.getElementById("viewer");

function escapeHtml(s){
  return (s ?? "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}
function addLine(kind, html){
  const div = document.createElement("div");
  div.className = "line " + kind;
  const p = document.createElement("div");
  p.className = "bubble";
  p.innerHTML = html;
  div.appendChild(p);
  elChat.appendChild(div);
  elChat.scrollTop = elChat.scrollHeight;
}
function addAction(title, detail){
  const a = document.createElement("div");
  a.className = "action";
  a.innerHTML = `<p class="t">${escapeHtml(title)}</p><p class="d">${detail}</p>`;
  const wrap = document.createElement("div");
  wrap.className = "line ai";
  const b = document.createElement("div");
  b.className = "bubble";
  b.appendChild(a);
  wrap.appendChild(b);
  elChat.appendChild(wrap);
  elChat.scrollTop = elChat.scrollHeight;
}

function setBusy(b){
  elInputBox.classList.toggle("disable", b);
  if(!b) setTimeout(()=> elInput.focus(), 30);
}

function normalizeUrlOrSearch(v){
  const s = (v||"").trim();
  if(!s) return "";
  const looksUrl = /^(https?:\/\/)/i.test(s) || s.includes(".") || s.startsWith("localhost");
  if(looksUrl) return s.startsWith("http") ? s : ("https://" + s);
  return "https://www.bing.com/search?q=" + encodeURIComponent(s);
}

/* Local viewer navigation (no parent interaction) */
function viewerGoto(v){
  const url = normalizeUrlOrSearch(v);
  if(!url) return;
  elViewerWrap.classList.remove("hidden");
  elViewer.src = url;
  // track history
  state.viewerHist = state.viewerHist.slice(0, state.viewerIdx + 1);
  state.viewerHist.push(url);
  state.viewerIdx = state.viewerHist.length - 1;
}
function viewerBack(){
  if(state.viewerIdx > 0){
    state.viewerIdx--;
    elViewer.src = state.viewerHist[state.viewerIdx];
  }
}
function viewerFwd(){
  if(state.viewerIdx < state.viewerHist.length - 1){
    state.viewerIdx++;
    elViewer.src = state.viewerHist[state.viewerIdx];
  }
}
function viewerReload(){
  try { elViewer.contentWindow.location.reload(); }
  catch(e){ elViewer.src = elViewer.src; }
}

/* Command handling: only inside this iframe */
function applyCommand(cmd){
  if (/^\{openurl\s+.+\}$/.test(cmd)) {
    const u = cmd.match(/^\{openurl\s+(.+)\}$/)[1];
    viewerGoto(u);
    addAction("Open URL (local viewer)", escapeHtml(u));
    return "";
  }
  if (/^\{settheme\s+.+\}$/.test(cmd)) {
    const mode = cmd.match(/^\{settheme\s+(.+)\}$/)[1];
    // local only
    if (mode === "dark") document.documentElement.classList.add("dark");
    if (mode === "light") document.documentElement.classList.remove("dark");
    addAction("Set theme (local)", escapeHtml(mode));
    return "";
  }
  if (/^\{openapp\s+.+\}$/.test(cmd)) {
    const app = cmd.match(/^\{openapp\s+(.+)\}$/)[1];
    // iframe cannot open Win12 apps: show action only
    addAction("Open app (ignored in iframe)", escapeHtml(app));
    return "";
  }
  if (/^\{feedback\s+.+\}$/.test(cmd)) {
    const what = cmd.match(/^\{feedback\s+(.+)\}$/)[1];
    addAction("Feedback (local)", escapeHtml(what) + "<br><span class='small'>This iframe page cannot open Win12 feedback UI.</span>");
    return "";
  }
  return cmd; // keep unknown commands as text
}

/* Parse response: extract {...} tokens and render with action blocks */
function renderAssistantResponse(text){
  let rt = String(text ?? "");
  const matches = rt.match(/\{.+?\}/g) || [];
  for(const token of matches){
    const replacement = applyCommand(token);
    rt = rt.replace(token, replacement);
  }
  // render remaining text (with <br> conversion)
  const safe = escapeHtml(rt).replace(/\n/g,"<br>");
  addLine("ai", safe || "<span class='small'>(no text)</span>");
}

/* Call API (same pattern as desktop.js copilot block you pasted) */
async function askApi(userText){
  const q = encodeURIComponent(userText);
  const sys = encodeURIComponent(state.history[0].content);
  const url = `${API_BASE}?question=${q}&system=${sys}&uid=${encodeURIComponent(state.uid)}`;

  const res = await fetch(url, { method: "GET" });
  if(!res.ok) throw new Error("HTTP " + res.status);
  return await res.text();
}

async function sendMessage(){
  const t = (elInput.value || "").trim();
  if(!t){
    addLine("system", "Please type something meaningful 🙂");
    return;
  }
  elInput.value = "";
  addLine("user", escapeHtml(t));
  state.history.push({ role:"user", content:t });

  setBusy(true);
  try{
    const respText = await askApi(t);
    state.history.push({ role:"assistant", content: respText });
    renderAssistantResponse(respText);
  }catch(err){
    addLine("system", "Error calling Copilot API. Check network / CORS / endpoint.");
    addLine("system", "<span class='small'>" + escapeHtml(String(err)) + "</span>");
  }finally{
    setBusy(false);
  }
}

/* UI actions */
document.getElementById("btnSend").addEventListener("click", sendMessage);

document.getElementById("btnOpenUrl").addEventListener("click", () => {
  const v = (elUrl.value || "").trim();
  if(!v) return;
  viewerGoto(v);
  addLine("system", "Opened in local Viewer.");
});

document.getElementById("btnToggleViewer").addEventListener("click", () => {
  elViewerWrap.classList.toggle("hidden");
});

document.getElementById("btnHelp").addEventListener("click", () => {
  addLine("system",
    "This Copilot runs inside an iframe and will not call parent Win12 functions.<br>" +
    "Commands like {openurl ...} open in the local Viewer. {openapp ...} is ignored."
  );
});

document.getElementById("btnViewerBack").addEventListener("click", viewerBack);
document.getElementById("btnViewerFwd").addEventListener("click", viewerFwd);
document.getElementById("btnViewerReload").addEventListener("click", viewerReload);

/* boot */
(function init(){
  addLine("system", "Windows 12 Copilot (Embedded) ready.");
  addLine("ai", "Hi! Ask me something, or paste a URL above to open it in Viewer.");
  setBusy(false);
  elInput.focus();
})();
</script>

</body>
</html>
